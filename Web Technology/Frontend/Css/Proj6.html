<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proj6</title>
    <style>
        .gridContainer {
            height: 600px;
            width: 800px;
            background-color: black;
            padding: 10px;

            display: grid;

            grid-template-rows: 1fr 1fr 1fr 1fr;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            gap: 10px;
        }

        .col1 {
            background-color: red;
            
            grid-row-start: 1;
            grid-row-end: 3;
        }
        
        .col2 {
            background-color: white;
            
            grid-row-start: 3;
            grid-row-end: 5;
        }
        
        .col3 {
            background-color: lightskyblue;
            
            grid-column-start: 2;
            grid-column-end: 4;
        }

        .col4 {
            background-color: orange;
            
            grid-row-start: 2;
            grid-row-end: 4;
        }
        
        .col5 {
            background-color: red;
            
            grid-column-start: 2;
            grid-column-end: 4;

            grid-row: 4;
        }
        
        .col6 {
            background-color: orange;
            
            grid-column-start: 4;
            grid-column-end: 6;
        }

        .col7 {
            background-color: white;
            
            grid-column-start: 3;
            grid-column-end: 5;

            grid-row-start: 2;
            grid-row-end: 4;
        }

        .col8 {
            background-color: lightskyblue;

            grid-row: 4;
        }

        .col9 {
            background-color: red;
            
            grid-row-start: 2;
            grid-row-end: 5;
        }

    </style>
</head>
<body>
    <div class="gridContainer">
        <div class="col1">1</div>
        <div class="col2">2</div>
        <div class="col3">3</div>
        <div class="col4">4</div>
        <div class="col5">5</div>
        <div class="col6">6</div>
        <div class="col7">7</div>
        <div class="col8">8</div>
        <div class="col9">9</div>
    </div>
    
</body>
</html>
