<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proj3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .container {
            height: 600px;
            width: 600px;
            background-color: gray;
            padding: 20px;
            border: 1px solid;
        }

        header {
            height: 15%;
            background-color: lightgreen;
        }

        main {
            height: 63.4%;
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        aside {
            background-color: lightgreen;
            width: 30%;
        }

        .boxes {
            width: 70%;
        }
        
        .box1 {
            background-color: lightgreen;
            height: 47.4%;
            margin-bottom: 20px;
        }

        .box2 {
            height: 47.4%;
            display: flex;
            justify-content: space-evenly;
            gap: 20px;
        }

        .content {
            background-color: lightgreen;
            width: 100%;
            height: 100%;
        }

        footer {
            height: 15%;
            background-color: lightgreen;
        }
    </style>
</head>
<body>

    <div class="container">
        <header></header>
        <main>
            <aside></aside>
            <div class="boxes">
                <div class="box1"></div>
                <div class="box2">
                    <div class="content content2"></div>
                    <div class="content content3"></div>
                </div> 
            </div>
        </main>
        <footer></footer>
    </div>
    
</body>
</html>
