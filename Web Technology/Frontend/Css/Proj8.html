<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Proj8</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        header {
            display: flex;
            justify-content: center;
            
        }
        nav {
            display: flex;
            height: 9vh;
            width: 90vw;
            background-color: gray;
            border-radius: 30px;
            position: fixed;
            top: 50px;
            justify-content: space-evenly;
            align-items: center;
        }
        ul {
            width: 500px;
            display: flex;
            color: white;
            justify-content: space-evenly;
            align-items: center;
        }
        li {
            display: flex;
            text-transform: uppercase;
            font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans';
        }
        sup {
            color: red;
        }
        .container {
            width: 100%;
            height: 100vh;
            background-image: url(../images/img1.jpeg);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
        }
        .content {
            padding-top: 150px;
            text-align: center;
        }
        .content h1 {
            text-transform: capitalize;
            font-size: 50px;
            font-family: 'Franklin Gothic Medium';
        }
        .container p {
            padding-top: 20px;
            font-family:Georgia;
        }
        
        input {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 15px;
            padding-left: 10px;
            width: 25vw;
            height: 5vh;
            border-radius: 10px;
        }
        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <!-- <img src="" alt="Logo"> -->
            <span>Isha</span>
            <ul>
                <li>Men</li>
                <li>Women</li>
                <li>Kids</li>
                <li>Home</li>
                <li>Beauty</li>
                <li>Genz</li>
                <li>Studio  <sup>new</sup></li>
            </ul>
            <div class="inputs">
                <i class="fa fa-search" aria-hidden="true"></i>
                <input placeholder="Search for content">
            </div>
            <div class="icon"><i class="fa fa-user" aria-hidden="true"></i><span>Profile</span></div>
            <div class="icon"><i class="fa fa-heart" aria-hidden="true"></i><span>Wishlist</span></div>
            <div class="icon"><i class="fa fa-shopping-bag" aria-hidden="true"></i><span>Cart</span></div>
        </nav>
    </header>
</body>
</html>
