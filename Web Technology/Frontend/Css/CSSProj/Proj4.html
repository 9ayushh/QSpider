<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proj4</title>
    <style>
        .container {
            width: 1100px;
            height: 700px;
            background-color: black;
            padding: 10px;
            display: flex;
        }
        aside {
            width: 25%;
            height: 100%;
            background-color: green;
            margin-right: 10px;
        }
        .box {
            width: 75%;
            height: 100%;
            display: flex;
        }
        .left {
            width: 66.6%;
            height: 100%;
            margin-right: 5px;
        }
        .top {
            width: 100%;
            height: 32.5%;
            background-color: green;
        }
        .bottom {
            width: 100%;
            height: 66%;
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        .box1 {
            width: 48.9%;
            height: 48.9%;
            background-color: yellow;
        }
        .box2 {
            width: 48.9%;
            height: 48.9%;
            background-color: red;
        }
        .box3 {
            width: 48.9%;
            height: 48.9%;
            background-color: red;
            /* margin-right: 5px; */
        }
        .box4 {
            width: 48.9%;
            height: 48.9%;
            background-color: yellow;
        }
        .right {
            width: 33.3%;
            height: 100%;
            margin-left: 5px;
        }
        .up {
            width: 100%;
            height: 32.5%;
            background-color: red;
        }
        .down {
            width: 100%;
            height: 66%;
            background-color: green;
            margin-top: 10px;
        }


    </style>
    
</head>
<body>
    <div class="container">
        <aside></aside>
        <div class="box">
            <div class="left">
                <div class="top"></div>
                <div class="bottom">
                    <div class="box1"></div>
                    <div class="box2"></div>
                    <div class="box3"></div>
                    <div class="box4"></div>
                </div>
            </div>
            <div class="right">
                <div class="up"></div>
                <div class="down"></div>
            </div>
        </div>
    </div>
    

</body>
</html>
