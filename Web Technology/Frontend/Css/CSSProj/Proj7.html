<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proj7</title>
    <style>
        .gridContainer {
            height: 500px;
            width: 1000px;
            background-color: black;
            padding: 10px;

            display: grid;

            grid-template-rows: 1fr 1fr 1fr;
            grid-template-columns: repeat(4,1fr); 
            /* repeat(3,1fr) repeat(5, 2fr).. can give to any number of time*/
            gap: 10px;
        }

        .gridItems {
            background-color: red;
        }

        .box1 {
            background-color: red;
            grid-row-start: 1;
            grid-row-end: 4;

            grid-column-start: 1;
            grid-column-end: 3;
        }

        .box2 {
            background-color: yellow;
            grid-column-start: 3;
            grid-column-end: 5;
        }

        .box3 {
            background-color: violet;
            grid-row-start: 2;
            grid-row-end: 4;
        }
        
        .box4 {
            background-color: blue;
        }

        .box5 {
            background-color: blue;
        }

    </style>
</head>
<body>
    <div class="gridContainer">
        <div class="gridItems box1"></div>
        <div class="gridItems box2"></div>
        <div class="gridItems box3"></div>
        <div class="gridItems box4"></div>
        <div class="gridItems box5"></div>
    </div>
</body>
</html>
