<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proj5</title>
    <style>
        .gridContainer {
            height: 600px;
            width: 800px;
            background-color: black;
            padding: 10px;

            display: grid;

            grid-template-rows: 1fr 1fr 1fr 1fr;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            gap: 10px;
        }

        .header {
            background-color: green;
            
            grid-column-start: 1;
            grid-column-end: 6;
        }
        
        .sidebar {
            background-color: green;
            
            grid-row-start: 2;
            grid-row-end: 4;
        }
        
        .col1 {
            background-color: green;
            
            grid-column-start: 2;
            grid-column-end: 6;
        }

        .col2 {
            background-color: green;
            
            grid-column-start: 2;
            grid-column-end: 4;
        }
        
        .col3 {
            background-color: green;
            
            grid-column-start: 4;
            grid-column-end: 6;
        }
        
        .footer {
            background-color: green;
            
            grid-column-start: 1;
            grid-column-end: 6;

            grid-row: 4;
        }

    </style>
</head>
<body>
    <div class="gridContainer">
        <div class="header"></div>
        <div class="sidebar"></div>
        <div class="col1"></div>
        <div class="col2"></div>
        <div class="col3"></div>
        <div class="footer"></div>
    </div>
</body>
</html>
