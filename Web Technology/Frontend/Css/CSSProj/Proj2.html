<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proj2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100%;
            background-color: rgb(129, 255, 213);
            /* display:flex; */
        }

        header {
            margin: 30px;
            padding: 30px;
            background-color: rgb(36, 108, 128);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        main {
            display: flex;
        }
        
        aside {
            margin-left: 30px;
            padding: 30px;
            background-color: rgb(81, 255, 0);
            display: flex;
            height: 560px;
            width: 30%;
            justify-content: center;
            align-items: center;
        }
        
        article {
            margin: 0 30px;
            width: 70%;
            padding: 30px;
            background-color: rgb(71, 125, 199);
            height: 560px;
            text-align: center;
        }
        p {
            height: 50%;
            display: flex;
            justify-content: center;
            align-items: flex-end;

        }

        .box {
            display: flex;
            justify-content: space-evenly;
            align-items: flex-end;
            height: 50%;
        }

        .image {
            display: flex;
            width: 200px;
            height: 200px;
            background-color: #fff;
            justify-content: center;
            align-items: center;    
        }

        footer {
            margin: 30px;
            padding: 30px;
            background-color: rgb(36, 108, 128);
            display: flex;
            justify-content: center;
            align-items: center;
        }

    </style>
</head>
<body>
    <header>Header</header>
    <main>
        <aside>Aside</aside>
        <article>
            <p>Article</p>
            <div class="box">
                <div class="image">Image</div>
                <div class="image">Image</div>
                <div class="image">Image</div>
            </div>
        </article>
    </main>
    <footer>Footer</footer>
</body>
</html>
